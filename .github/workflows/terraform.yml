name: Terraform

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache

jobs:
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.0

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: |
            .terraform
            .terraform.d/plugin-cache
          key: terraform-${{ runner.os }}-${{ hashFiles('**/*.tf', '.terraform.lock.hcl') }}
          restore-keys: |
            terraform-${{ runner.os }}-

      - name: Initialize Terraform
        run: |
          mkdir -p "$TF_PLUGIN_CACHE_DIR"
          terraform init -backend=false

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive

      - name: Validate Terraform
        run: terraform validate

  release-tag:
    name: Release Tag
    runs-on: ubuntu-latest
    needs:
      - terraform-validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create next semantic version tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force origin

          existing_tag="$(git tag --points-at "$GITHUB_SHA" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
          if [[ -n "$existing_tag" ]]; then
            echo "Semantic version tag already exists for ${GITHUB_SHA}: ${existing_tag}"
            echo "release_tag=${existing_tag}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag="$(git tag -l 'v*' --sort=-version:refname | head -n1)"
          if [[ -z "$latest_tag" ]]; then
            latest_tag="v0.0.0"
          fi

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version"
          new_tag="v${major}.${minor}.$((patch + 1))"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$new_tag" -m "Release $new_tag"
          git push origin "$new_tag"
          echo "release_tag=${new_tag}" >> "$GITHUB_OUTPUT"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - release-tag
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs['release-tag'].outputs.release_tag != ''
    permissions:
      contents: write

    steps:
      - name: Create GitHub release for tag
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs['release-tag'].outputs.release_tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });

              core.info(`Release already exists for ${tag}: ${existing.data.html_url}`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              const release = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: tag,
                generate_release_notes: true,
              });

              core.info(`Created release ${release.data.html_url}`);
            }
